<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gezel</title>
    <meta name="description" content="Gezel — by Bendyline." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbfbfa;
        --fg: #1c1c1a;
        --muted: #6b6b66;
        --accent: #2f6f4f;
        --rule: #e4e4e0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #141513;
          --fg: #ececea;
          --muted: #9a9a94;
          --accent: #7dc9a0;
          --rule: #2b2c29;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1.5rem;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      main {
        width: 100%;
        max-width: 34rem;
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: clamp(2.5rem, 8vw, 4rem);
        letter-spacing: -0.03em;
        line-height: 1.05;
      }

      .tagline {
        margin: 0 0 2rem;
        color: var(--accent);
        font-size: 1.125rem;
      }

      p {
        color: var(--muted);
      }

      footer {
        margin-top: 2.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--rule);
        font-size: 0.875rem;
        color: var(--muted);
      }

      a {
        color: inherit;
        text-decoration-color: var(--rule);
        text-underline-offset: 0.2em;
      }

      a:hover {
        text-decoration-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Gezel</h1>
      <p class="tagline">Something new from Bendyline.</p>
      <p>
        This site is under construction. Check back soon — or follow along on
        <a href="https://github.com/bendyline/">GitHub</a>.
      </p>
      <footer>
        &copy; 2026 Bendyline &middot; MIT licensed
      </footer>
    </main>
  </body>
</html>
